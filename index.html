<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>150 интересных фильмов — сюжеты</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --panel: #1a1a1a;
      --panel-hover: #2a2a2a;
      --text: #f3f3f3;
      --muted: #a3a3a3;
      --accent: #d4d4d4;
      --shadow: rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(170deg, #000000, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(1200px, 92vw);
      margin: 28px auto 40px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 2.7vw, 2.2rem);
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .stats {
      margin: 0 0 18px;
      color: #d4d4d4;
      font-size: 0.92rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
    }

    .movie-card {
      border: 0;
      background: var(--panel);
      color: inherit;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 18px var(--shadow);
      cursor: pointer;
      text-align: left;
      transition: transform 0.2s ease, background 0.2s ease;
      padding: 0;
      position: relative;
    }

    .movie-card:hover,
    .movie-card:focus-visible {
      transform: translateY(-3px);
      background: var(--panel-hover);
      outline: none;
    }

    .cover {
      width: 100%;
      aspect-ratio: 2 / 3;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 10px;
      background-size: cover;
      background-position: center;
    }

    .cover::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.2));
    }

    .cover-title {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.25;
    }

    .read-mark {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(235, 235, 235, 0.9);
      color: #121212;
      border-radius: 999px;
      font-size: 0.72rem;
      padding: 4px 8px;
      font-weight: 700;
      z-index: 2;
      display: none;
    }

    .movie-card.read .read-mark {
      display: inline-block;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.68);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 20;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      width: min(740px, 96vw);
      max-height: 86vh;
      overflow: auto;
      background: #111111;
      border: 1px solid #2e2e2e;
      border-radius: 14px;
      box-shadow: 0 16px 40px var(--shadow);
      padding: 18px 18px 16px;
      position: relative;
    }

    .modal-content h2 {
      margin: 0 34px 10px 0;
      font-size: 1.35rem;
    }

    .modal-content p {
      margin: 0;
      line-height: 1.55;
      color: #e7e7e7;
    }

    .close-btn {
      position: absolute;
      right: 10px;
      top: 10px;
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 8px;
      background: #262626;
      color: #f3f3f3;
      cursor: pointer;
      font-size: 1.05rem;
    }

    .close-btn:hover {
      background: #3a3a3a;
    }
  </style>

      "Оскар Шиндлер, немецкий промышленник и член нацистской партии, постепенно осознает масштаб ужаса Холокоста. Он рискует всем, чтобы спасти сотни евреев, устроив их на свою фабрику.",
      "Польский пианист Владислав Шпильман пытается выжить в оккупированной Варшаве во время Второй мировой войны. Музыка и случайные проявления человечности помогают ему пережить катастрофу.",
      "Еврейский официант Гвидо превращает ужасы концлагеря в игру для своего маленького сына, чтобы защитить его психику. Трагикомичная история показывает силу любви перед лицом смерти.",

      "После Судного дня Джон Коннор становится целью нового, почти неуязвимого терминатора T-1000. Чтобы спасти его, из будущего отправляют перепрограммированного T-800.",
      "Экипаж космического корабля «Ностромо» подбирает неизвестную форму жизни, которая превращается в смертоносного ксеноморфа. Рипли вынуждена бороться за выживание в замкнутом пространстве.",

      "Команда спецназа в джунглях Центральной Америки становится добычей невидимого инопланетного охотника. Лидер отряда Датч остается один на один с Хищником.",
      "Подросток Марти МакФлай случайно отправляется в 1955 год на машине времени дока Брауна. Чтобы вернуться, он должен восстановить знакомство своих родителей и не стереть себя из будущего.",
      "Марти переносится в 2015 год, где попытка исправить судьбу семьи приводит к катастрофической альтернативной реальности. Вместе с доком он ищет способ вернуть нормальный ход событий.",
      "Чтобы окончательно исправить временную линию, Марти отправляется на Дикий Запад 1885 года спасать дока Брауна. Там им предстоит решить, что важнее: любовь или возвращение домой.",
      "Аристократка Роуз и бедный художник Джек знакомятся на борту «Титаника». Их роман разворачивается на фоне неизбежной морской катастрофы.",
      "Бывший морпех Джейк Салли прибывает на Пандору и через аватар знакомится с культурой народа на’ви. Он оказывается между приказом людей и долгом перед новым домом.",
      "Семья Джейка и Нейтири вынуждена искать убежище у морского клана на’ви, когда война с людьми вспыхивает снова. История о семье, потере и сопротивлении захватчикам.",
      "Львенок Симба после гибели отца считает себя виновным и бежит из прайда. Повзрослев, он возвращается, чтобы вернуть трон у тирана Шрама.",
      "Робот-уборщик ВАЛЛ-И веками очищает опустевшую Землю и случайно встречает робота ЕВА. Их путешествие запускает возвращение человечества к жизни на планете.",
      "Старик Карл, исполняя мечту покойной жены, поднимает дом в небо на воздушных шарах и отправляется в Южную Америку. Неожиданным спутником становится мальчик-скаут Рассел.",
      "В голове девочки Райли эмоции Радость, Печаль, Страх, Гнев и Брезгливость пытаются помочь ей пережить переезд. Фильм показывает, как важна не только радость, но и принятие грусти.",

      "Крысенок Реми обладает выдающимся вкусом и мечтает стать шеф-поваром в Париже. Он объединяется с неуклюжим Лингвини, чтобы доказать: талант может быть у каждого.",
      "Шотландский воин Уильям Уоллес поднимает восстание против английского владычества после личной трагедии. Его борьба становится символом свободы для всей страны.",
      "Из-за любви Елены начинается война между Троей и греческими царствами. На фоне масштабной осады разворачиваются судьбы Ахиллеса, Гектора и целых народов.",

      "Американский офицер Нэйтан Олгрен отправляется в Японию обучать императорскую армию, но попадает в плен к самураям. Он пересматривает взгляды и становится участником последней битвы традиций.",

      "Безработный «Чувак» Лебовски после нелепой ошибки с однофамильцем оказывается в центре абсурдного похищения. Детективная линия превращается в комедию хаоса.",
      "Беременная шериф Марж расследует серию убийств, вызванных неудачной попыткой получить выкуп. Черный юмор сочетается с жестокой историей о жадности.",
      "Отец похищенной девочки решает действовать сам, пока детектив Локи ведет официальное расследование. Поиски истины ставят героев перед моральной пропастью.",

      "После исчезновения жены Ник Данн становится главным подозреваемым. Постепенно раскрывается тщательно продуманная игра манипуляций и медийного давления.",
      "Журналист Микаэль и хакер Лисбет расследуют исчезновение девушки в влиятельной семье. Тайны прошлого ведут к цепочке жестоких преступлений.",
      "Карикатурист Роберт Грейсмит одержимо расследует личность серийного убийцы Зодиака. Годы поисков разрушают его личную жизнь и карьеру.",
      "Богатый банкир получает странный подарок — участие в «игре», которая постепенно поглощает его реальность. Он больше не понимает, где постановка, а где смертельная опасность.",

      "Постаревший мутант Логан пытается скрыться от мира, пока не встречает девочку Лору с такими же способностями. Их путь становится прощальной историей Росомахи.",

      "Конфликт из-за контроля над супергероями раскалывает Мстителей на два лагеря. Противостояние Тони Старка и Стива Роджерса меняет их отношения навсегда.",
      "Нейрохирург Стивен Стрэндж после аварии теряет карьеру и ищет исцеление. В итоге он становится магом, защищающим Землю от межпространственных угроз.",
      "Команда космических авантюристов во главе с Питером Квиллом крадет загадочный артефакт и случайно спасает галактику. История о семье, найденной в хаосе.",
      "Подросток Майлз Моралес получает силы Человека-паука и встречает героев из разных вселенных. Вместе они пытаются остановить разрушение мультивселенной.",
      "Уинстон Черчилль в первые недели на посту премьер-министра должен решить: вести переговоры с Гитлером или продолжать войну. Политическая драма о выборе курса истории.",

      "Союзники проводят эвакуацию сотен тысяч солдат из Дюнкерка, зажатых немецкими войсками. Спасение происходит одновременно на земле, воде и в воздухе.",
      "Капитан Джон Миллер ведет отряд за линию фронта, чтобы вернуть домой рядового Райана, потерявшего братьев. Военная миссия проверяет цену человеческой жизни.",

      "Новобранцы морской пехоты проходят жестокую подготовку, после чего сталкиваются с реальностью войны во Вьетнаме. Фильм исследует деформацию личности под давлением системы.",

      "Бывший наемник Уильям Манни берется за последнее дело ради денег. Вестерн показывает, как насилие оставляет след на каждом участнике.",
      "Трое ученых создают бизнес по ловле призраков в Нью-Йорке и сталкиваются с древним злом. Легкая фантастическая комедия о паранормальном хаосе.",
      "Археолог Индиана Джонс ищет Ковчег Завета раньше нацистов. Приключенческий фильм о ловушках, погонях и мифической силе артефакта.",

      "На курортный город нападает огромная белая акула. Шериф, океанолог и охотник отправляются в море, чтобы остановить хищника.",

      "Математик Джон Нэш совершает прорыв в науке, но сталкивается с тяжелым психическим заболеванием. Фильм о борьбе за реальность, любовь и признание.",

      "Жизни четырех людей, зависимых от наркотиков, постепенно рушатся под давлением иллюзий и зависимости. Мрачная драма о саморазрушении.",

    function hashString(text) {
      let hash = 0;
      for (let i = 0; i < text.length; i += 1) {
        hash = (hash << 5) - hash + text.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    function makeCoverStyle(id, title) {
      const filmGrabImage = filmGrabCovers[id];
      if (filmGrabImage) {
        return `background-image: url('${filmGrabImage}'); background-size: cover; background-position: center;`;
      }
      const base = hashString(id);
      const shade = 120 + (base % 90);
      const bg = `${shade.toString(16).padStart(2, "0")}`.repeat(3);
      const text = base % 2 === 0 ? "222222" : "111111";
      const _title = encodeURIComponent(title);
      const image = `https://placehold.co/400x600/${bg}/${text}?text=${_title}`;
      return `background-image: url('${image}'); background-size: cover; background-position: center;`;
    }

    function saveRead() {
      localStorage.setItem(storageKey, JSON.stringify(Array.from(readIds)));
    }

    function refreshStats() {
      stats.textContent = `Прочитано: ${readIds.size} из ${movies.length}`;
    }

    function markAsRead(id) {
      if (!readIds.has(id)) {
        readIds.add(id);
        saveRead();
      }
      const card = document.querySelector(`[data-id="${id}"]`);
      if (card) {
        card.classList.add("read");
      }
      refreshStats();
    }

    function openModal(movie) {
      modalTitle.textContent = movie.title;
      modalPlot.textContent = movie.plot;
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
      markAsRead(movie.id);
    }

    function closeModal() {
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
    }

    movies.forEach((movie) => {
      const card = document.createElement("button");
      card.className = "movie-card";
      card.dataset.id = movie.id;
      card.innerHTML = `
        <span class="read-mark">Прочитано</span>
        <div class="cover" style="${makeCoverStyle(movie.id, movie.title)}">
          <h3 class="cover-title">${movie.title}</h3>
        </div>
      `;

      if (readIds.has(movie.id)) {
        card.classList.add("read");
      }

      card.addEventListener("click", () => openModal(movie));
      movieGrid.appendChild(card);
    });

    closeModalBtn.addEventListener("click", closeModal);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modal.classList.contains("open")) {
        closeModal();
      }
    });

    refreshStats();
